<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Вечеринка</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="slides">
    <section class="slide slide-1 watch-animate is-visible" id="slide-1">
      <div class="grain"></div>
      <div class="bg-shape bg-shape-a"></div>
      <div class="bg-shape bg-shape-b"></div>

      <div class="rings-stack" aria-hidden="true">
        <svg class="ring ring-inner-1" viewBox="0 0 800 800">
          <defs>
            <path id="circle-inner-1" d="M 400,400 m -220,0 a 220,220 0 1,1 440,0 a 220,220 0 1,1 -440,0"></path>
          </defs>
          <text>
            <textPath href="#circle-inner-1" startOffset="0%">ПРИГЛАШЕНИЕ НА ВЕЧЕРИНКУ • ПРИГЛАШЕНИЕ НА ВЕЧЕРИНКУ • </textPath>
          </text>
        </svg>

        <svg class="ring ring-inner-2" viewBox="0 0 800 800">
          <defs>
            <path id="circle-inner-2" d="M 400,400 m -156,0 a 156,156 0 1,1 312,0 a 156,156 0 1,1 -312,0"></path>
          </defs>
          <text>
            <textPath href="#circle-inner-2" startOffset="0%">ПРИГЛАШЕНИЕ • ПРИГЛАШЕНИЕ • </textPath>
          </text>
        </svg>

        <img class="ring-img ring-outer" src="КольцоСтекстом.png" alt="">
      </div>

      <div class="fly-left s1-leg-wrap">
        <img class="s1-leg sway-leg" src="Нога.png" alt="Нога с бутылкой">
      </div>

      <div class="fly-right s1-guy-wrap">
        <img class="s1-guy sway-guy" src="ЧеловекПервый слайд.png" alt="Человек">
      </div>

      <div class="s1-info-wrap fly-info">
        <img class="s1-info-img" src="ПодробнаяинформацияТекст.png" alt="Подробная информация снизу">
      </div>
    </section>

    <section class="slide slide-2 watch-animate" id="slide-2">
      <div class="grain"></div>
      <div class="rainbow rainbow-a"></div>
      <div class="rainbow rainbow-b"></div>

      <h2 class="address fly-top">
        <span>📍 МЕСТО 📍</span>
        <span>Уфа, Максимовка</span>
        <span>Ул. Лучистая, д. 39</span>
      </h2>

      <div class="map-wrap">
        <video class="map-video" src="IMG_7962.MOV" autoplay muted loop playsinline preload="auto"></video>
      </div>

      <div class="fly-left s2-left-wrap">
        <img class="s2-left-person" src="photo-output-no-bg-preview-carve.photos 6.png" alt="Человек слева">
      </div>

      <div class="fly-right s2-right-wrap">
        <img class="s2-right-person" src="photo-output-no-bg-preview-carve.photos 7.png" alt="Человек справа">
      </div>
    </section>

    <section class="slide slide-3 watch-animate" id="slide-3">
      <div class="grain"></div>
      <div class="flare flare-a"></div>
      <div class="flare flare-b"></div>

      <img class="s3-top-person fly-down" src="photo-output-no-bg-preview-carve.photos 8.png" alt="Человек сверху">

      <div class="s3-note fade-up">
        <p>ЧТО С СОБОЙ БРАТЬ?<br>ВО СКОЛЬКО ПРИХОДИТЬ?<br>И ЛЮБЫЕ ДРУГИЕ МОМЕНТЫ<br>✏ В SMS TGгруппа!!! ✏</p>
      </div>

      <div class="tg-content fade-up">
        <a href="https://t.me/+ik0ke34WtR01NGZi" class="tg-btn" target="_blank" rel="noopener noreferrer">ПЕРЕЙТИ В ТГК</a>
      </div>

      <img class="s3-bottom-person fly-up" src="photo-output-no-bg-preview-carve.photos 10.png" alt="Человек снизу">

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
